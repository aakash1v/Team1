    <style>
        /* Navbar Styling */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 15px 30px;
    background: rgba(182, 57, 57, 0.8);
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
}

.navbar .logo img {
    height: 50px;
    width: auto;
    border-radius: 5px;
}

.navbar .slogan h1 {
    margin: 0;
    font-size: 1.5rem;
    color: #fff;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.7);
}

/* Adjustments for body to fit navbar */
body {
    padding-top: 80px; /* Adjust padding to avoid overlap with navbar */
}
