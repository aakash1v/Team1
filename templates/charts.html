<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Charts</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script> <!-- Include Plotly -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <style>
        /* General Styling */
        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url(../../static/images/image.jpg) no-repeat center center fixed;
            background-size: cover;
            color: #fff;
        }

        .container {
            width: 80%;
            background: rgba(182, 57, 57, 0.1);
            border: 2px solid rgba(102, 28, 28, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            color: #fff;
            padding: 20px 30px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* Charts Styling */
        .chart-container {
            margin-bottom: 40px;
        }

        /* Buttons */
        button {
            background: #fff;
            color: #333;
            font-size: 14px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #ddd;
        }

        /* Alert Messages */
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }

        .alert-danger {
            background-color: rgba(255, 0, 0, 0.1);
            color: rgba(255, 0, 0, 0.8);
        }

        /* Table Scroll */
        table {
            overflow-x: auto;
            display: block;
            max-height: 400px;
        }

        /* Admin Profile Picture (if needed in this page) */
        .admin-container {
            display: flex;
            justify-content: space-between;
            width: 90%;
            margin-bottom: -40px;
        }

        .admin-pic {
            height: 80px;
            width: 80px;
            border-radius: 50%;
            padding: 1px;
            border: 1px solid rgb(172, 54, 50);
            outline: 1px solid #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>User Analytics      
            
</h1>
<a href="{{url_for('auth.admin_dashboard')}}" class="btn btn-info">Back to admin dashboard</a>
        <div class="chart-container">
            <h2>User Login Distribution by Role</h2>
        {{ pie_chart|safe }}
        </div>

        <div class="chart-container">
            <h2>Session Duration vs. Number of Login Sessions per User</h2>
            {{ bar_chart|safe }}

    </div>
</body>
</html>
